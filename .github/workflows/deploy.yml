name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install sshpass
      run: sudo apt-get update && sudo apt-get install -y sshpass

    - name: Deploy to VPS
      run: |
        sshpass -p 'krs@L@Hrm@2026' ssh -o StrictHostKeyChecking=no root@187.77.128.105 "
          cd /var/www/hrm

          # Git pull
          git fetch --all
          git reset --hard origin/main
          git clean -fd

          # Composer
          export COMPOSER_ALLOW_SUPERUSER=1
          /usr/bin/php8.4 \$(which composer) install --no-interaction --prefer-dist --optimize-autoloader --no-dev

          # .env
          cp -f .env.example .env
          /usr/bin/php8.4 artisan key:generate --force

          # Cache clear
          /usr/bin/php8.4 artisan config:clear
          /usr/bin/php8.4 artisan route:clear
          /usr/bin/php8.4 artisan view:clear

          # NPM
          npm ci --no-audit --no-fund 2>/dev/null || npm install --no-audit --no-fund
          npm run build

          # Migrate
          /usr/bin/php8.4 artisan migrate --force 2>&1 || true

          # Permissions
          chmod -R 775 storage bootstrap/cache

          echo '✅ Done'
        "
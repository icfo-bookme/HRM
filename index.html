<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas HR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'] },
                    colors: {
                        navy: { 800: '#1e3a8a', 900: '#1e3163' },
                    },
                    transitionProperty: { width: 'width', 'min-width': 'min-width' },
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Sidebar width transitions */
        #sidebar {
            transition: width 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Submenu slide */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s ease;
        }

        .submenu.open {
            max-height: 260px;
        }

        /* Hide text when collapsed */
        #sidebar.collapsed .nav-label,
        #sidebar.collapsed .logo-text,
        #sidebar.collapsed .nav-chevron,
        #sidebar.collapsed .sub-indent {
            display: none;
        }

        #sidebar.collapsed .submenu {
            display: none !important;
        }

        #sidebar.collapsed .nav-item {
            justify-content: center;
        }

        /* Hide search box when collapsed */
        #sidebar.collapsed #searchBox {
            display: none;
        }

        #sidebar.collapsed #searchEmptyMsg {
            display: none;
        }

        /* Tooltip */
        .nav-tooltip {
            position: fixed;
            left: 68px;
            background: #111827;
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            z-index: 9999;
            transition: opacity 0.12s;
        }

        .nav-tooltip.show {
            opacity: 1;
        }

        /* Scrollbar */
        #sideNav::-webkit-scrollbar {
            width: 3px;
        }

        #sideNav::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 4px;
        }

        /* Chevron rotate */
        .has-sub.open>.nav-chevron {
            transform: rotate(180deg);
        }

        .nav-chevron {
            transition: transform 0.2s;
        }
    </style>
</head>

<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden">

    <!-- ========== TOOLTIP ========== -->
    <div class="nav-tooltip" id="navTooltip"></div>

    <!-- ========== SIDEBAR ========== -->
    <aside id="sidebar" class="w-56 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 z-30 overflow-hidden">

        <!-- Logo -->
        <div class="h-[60px] flex items-center justify-between px-3.5 border-b border-gray-200 flex-shrink-0">
            <div class="flex items-center gap-2 overflow-hidden">
                <!-- A icon circle matching Atlas HR -->
                <div
                    class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-blue-800 flex items-center justify-center flex-shrink-0 shadow-sm">
                    <span class="text-white font-bold text-sm leading-none">A</span>
                </div>
                <span class="logo-text font-semibold text-gray-800 text-[15px] whitespace-nowrap">Atlas HR</span>
            </div>
            <!-- Collapse button — round with chevron -->
            <button id="collapseBtn"
                class="w-6 h-6 rounded-full border border-gray-200 bg-white flex items-center justify-center text-gray-400 hover:bg-gray-50 flex-shrink-0 shadow-sm">
                <i class="fas fa-chevron-left text-[10px]" id="collapseIcon"></i>
            </button>
        </div>

        <!-- Search Box -->
        <div id="searchBox" class="px-2.5 py-2.5 border-b border-gray-100 flex-shrink-0">
            <div
                class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-100 transition-all">
                <i class="fas fa-search text-gray-400 text-xs flex-shrink-0"></i>
                <input id="sidebarSearch" type="text" placeholder="Search menus..."
                    class="bg-transparent border-none outline-none text-[13px] text-gray-700 placeholder-gray-400 w-full" />
                <button id="searchClear" class="hidden text-gray-300 hover:text-gray-500 transition-colors">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </div>
            <p id="searchEmptyMsg" class="hidden text-[11px] text-gray-400 mt-1.5 px-1">No matching items found</p>
        </div>

        <!-- Navigation -->
        <nav id="sideNav" class="flex-1 overflow-y-auto overflow-x-hidden py-2.5 px-2">

            <!-- Dashboard -->
            <a href="#"
                class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-gray-800 text-sm font-medium transition-colors duration-150 mb-0.5"
                data-label="Dashboard">
                <i class="fas fa-th-large w-4 text-center flex-shrink-0 text-base"></i>
                <span class="nav-label">Dashboard</span>
            </a>

            <!-- Employees (submenu) -->
            <div class="mb-0.5">
                <button
                    class="nav-item has-sub w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-gray-800 text-sm font-medium transition-colors duration-150"
                    data-label="Employees" data-sub="sub-emp">
                    <i class="fas fa-users w-4 text-center flex-shrink-0 text-base"></i>
                    <span class="nav-label flex-1 text-left">Employees</span>
                    <i class="nav-chevron fas fa-chevron-down text-[10px] flex-shrink-0"></i>
                </button>
                <div class="submenu sub-indent" id="sub-emp">
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-user-plus w-3.5 text-center"></i><span>Add Employee</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-list w-3.5 text-center"></i><span>Employee List</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-sitemap w-3.5 text-center"></i><span>Departments</span>
                    </a>
                </div>
            </div>

            <!-- Shifts -->
            <a href="#"
                class="nav-item flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-gray-800 text-sm font-medium transition-colors duration-150 mb-0.5"
                data-label="Shifts">
                <i class="fas fa-clock w-4 text-center flex-shrink-0 text-base"></i>
                <span class="nav-label">Shifts</span>
            </a>

            <!-- Attendance — ACTIVE -->
            <a href="#"
                class="nav-item active flex items-center gap-2.5 px-3 py-2 rounded-lg bg-[#1e3a8a] text-white text-sm font-medium mb-0.5"
                data-label="Attendance">
                <i class="fas fa-calendar-check w-4 text-center flex-shrink-0 text-base"></i>
                <span class="nav-label">Attendance</span>
            </a>

            <!-- Reports (submenu) -->
            <div class="mb-0.5">
                <button
                    class="nav-item has-sub w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-gray-800 text-sm font-medium transition-colors duration-150"
                    data-label="Reports" data-sub="sub-rep">
                    <i class="fas fa-chart-bar w-4 text-center flex-shrink-0 text-base"></i>
                    <span class="nav-label flex-1 text-left">Reports</span>
                    <i class="nav-chevron fas fa-chevron-down text-[10px] flex-shrink-0"></i>
                </button>
                <div class="submenu sub-indent" id="sub-rep">
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-calendar-check w-3.5 text-center"></i><span>Attendance Report</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-money-bill-wave w-3.5 text-center"></i><span>Payroll Report</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-user-tie w-3.5 text-center"></i><span>HR Analytics</span>
                    </a>
                </div>
            </div>

            <!-- Settings (submenu) -->
            <div class="mb-0.5">
                <button
                    class="nav-item has-sub w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-gray-500 hover:bg-gray-50 hover:text-gray-800 text-sm font-medium transition-colors duration-150"
                    data-label="Settings" data-sub="sub-set">
                    <i class="fas fa-cog w-4 text-center flex-shrink-0 text-base"></i>
                    <span class="nav-label flex-1 text-left">Settings</span>
                    <i class="nav-chevron fas fa-chevron-down text-[10px] flex-shrink-0"></i>
                </button>
                <div class="submenu sub-indent" id="sub-set">
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-user-shield w-3.5 text-center"></i><span>User Management</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-lock w-3.5 text-center"></i><span>Roles & Permissions</span>
                    </a>
                    <a href="#"
                        class="flex items-center gap-2.5 pl-9 pr-3 py-1.5 rounded-lg text-gray-400 hover:text-gray-700 hover:bg-gray-50 text-[13px] transition-colors">
                        <i class="fas fa-sliders-h w-3.5 text-center"></i><span>System Settings</span>
                    </a>
                </div>
            </div>

        </nav>
    </aside>

    <!-- ========== MAIN AREA ========== -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- ========== TOPBAR / HEADER ========== -->
        <header
            class="h-[60px] bg-white border-b border-gray-200 flex items-center justify-between px-6 flex-shrink-0 z-20">

            <!-- Search -->
            <div class="flex items-center gap-2 bg-gray-50 border border-gray-200 rounded-lg px-3 py-1.5 w-52">
                <i class="fas fa-search text-gray-400 text-xs"></i>
                <input type="text" placeholder="Search"
                    class="bg-transparent border-none outline-none text-sm text-gray-700 placeholder-gray-400 w-full" />
            </div>

            <!-- Right side -->
            <div class="flex items-center gap-3">

                <!-- Notification bell -->
                <button
                    class="relative w-9 h-9 border border-gray-200 rounded-lg flex items-center justify-center text-gray-500 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-bell text-[15px]"></i>
                    <span
                        class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>

                <!-- Settings gear -->
                <button
                    class="w-9 h-9 border border-gray-200 rounded-lg flex items-center justify-center text-gray-500 hover:bg-gray-50 transition-colors">
                    <i class="fas fa-cog text-[15px]"></i>
                </button>

                <!-- Divider -->
                <div class="w-px h-6 bg-gray-200"></div>

                <!-- User chip -->
                <div class="flex items-center gap-2.5 cursor-pointer group">
                    <!-- Avatar: photo placeholder styled like Sarah Chen -->
                    <div
                        class="w-[34px] h-[34px] rounded-full overflow-hidden bg-gradient-to-br from-rose-400 to-pink-600 flex items-center justify-center flex-shrink-0 ring-2 ring-white shadow-sm">
                        <span class="text-white text-xs font-bold">SC</span>
                    </div>
                    <div class="leading-tight">
                        <p class="text-[11px] text-gray-400 font-medium">Admin</p>
                        <p class="text-[13px] text-gray-800 font-semibold">Sarah Chen</p>
                    </div>
                    <i
                        class="fas fa-chevron-down text-[10px] text-gray-400 group-hover:text-gray-600 transition-colors"></i>
                </div>

            </div>
        </header>

        <!-- ========== CONTENT PLACEHOLDER ========== -->
        <main class="flex-1 overflow-y-auto bg-gray-100 p-6">
            <div class="h-full flex items-center justify-center">
                <div class="text-center text-gray-300">
                    <i class="fas fa-layer-group text-6xl mb-4 block"></i>
                    <p class="text-lg font-medium">Content Area</p>
                </div>
            </div>
        </main>

    </div>

    <!-- ========== JS ========== -->
    <script>
            (function () {
                const sidebar = document.getElementById('sidebar');
                const collapseBtn = document.getElementById('collapseBtn');
                const collapseIcon = document.getElementById('collapseIcon');
                const navTooltip = document.getElementById('navTooltip');
                let collapsed = false;

                /* ---- Collapse toggle ---- */
                collapseBtn.addEventListener('click', () => {
                    collapsed = !collapsed;
                    if (collapsed) {
                        sidebar.classList.add('collapsed');
                        sidebar.style.width = '60px';
                        collapseIcon.className = 'fas fa-chevron-right text-[10px]';
                    } else {
                        sidebar.classList.remove('collapsed');
                        sidebar.style.width = '224px'; // w-56
                        collapseIcon.className = 'fas fa-chevron-left text-[10px]';
                    }
                });

                /* ---- Submenu toggles ---- */
                document.querySelectorAll('.has-sub').forEach(btn => {
                    btn.addEventListener('click', function () {
                        if (collapsed) return;
                        const subId = this.dataset.sub;
                        const sub = document.getElementById(subId);
                        const isOpen = sub.classList.contains('open');

                        // Close all
                        document.querySelectorAll('.submenu').forEach(s => s.classList.remove('open'));
                        document.querySelectorAll('.has-sub').forEach(b => b.classList.remove('open'));

                        if (!isOpen) {
                            sub.classList.add('open');
                            this.classList.add('open');
                        }
                    });
                });

                /* ---- Tooltip on collapsed ---- */
                document.querySelectorAll('.nav-item[data-label], .has-sub[data-label]').forEach(el => {
                    el.addEventListener('mouseenter', function (e) {
                        if (!collapsed) return;
                        navTooltip.textContent = this.dataset.label;
                        const rect = this.getBoundingClientRect();
                        navTooltip.style.top = (rect.top + rect.height / 2 - 11) + 'px';
                        navTooltip.classList.add('show');
                    });
                    el.addEventListener('mouseleave', () => navTooltip.classList.remove('show'));
                });

                /* ---- Sidebar Search ---- */
                const searchInput = document.getElementById('sidebarSearch');
                const searchClear = document.getElementById('searchClear');
                const searchEmptyMsg = document.getElementById('searchEmptyMsg');

                // Build a flat list of all searchable nav items
                // Each entry: { el, label, parentGroup (optional) }
                function getAllNavItems() {
                    const items = [];
                    // Top-level single nav items (a.nav-item with data-label)
                    document.querySelectorAll('#sideNav a.nav-item[data-label]').forEach(el => {
                        items.push({ el, label: el.dataset.label, group: null });
                    });
                    // Top-level submenu buttons
                    document.querySelectorAll('#sideNav button.has-sub[data-label]').forEach(btn => {
                        items.push({ el: btn, label: btn.dataset.label, group: null, subId: btn.dataset.sub });
                    });
                    // Sub items — each a tag inside .submenu
                    document.querySelectorAll('#sideNav .submenu a').forEach(el => {
                        const label = el.querySelector('span') ? el.querySelector('span').textContent.trim() : '';
                        const subEl = el.closest('.submenu');
                        const parentBtn = subEl ? document.querySelector(`[data-sub="${subEl.id}"]`) : null;
                        items.push({ el, label, group: subEl, parentBtn });
                    });
                    return items;
                }

                let searchDebounce;
                searchInput.addEventListener('input', function () {
                    clearTimeout(searchDebounce);
                    searchDebounce = setTimeout(() => {
                        const term = this.value.trim().toLowerCase();

                        // Show/hide clear button
                        searchClear.classList.toggle('hidden', !term);

                        if (!term) {
                            resetSearch();
                            return;
                        }

                        const allItems = getAllNavItems();
                        let anyMatch = false;

                        // Hide everything first
                        document.querySelectorAll('#sideNav > *').forEach(el => el.style.display = 'none');
                        document.querySelectorAll('#sideNav .submenu').forEach(s => {
                            s.classList.remove('open');
                            s.style.display = '';
                        });

                        allItems.forEach(item => {
                            if (item.label.toLowerCase().includes(term)) {
                                anyMatch = true;
                                item.el.style.display = '';

                                if (item.group && item.parentBtn) {
                                    // Show parent group wrapper div
                                    const wrapper = item.parentBtn.closest('div');
                                    if (wrapper) wrapper.style.display = '';
                                    item.parentBtn.style.display = '';
                                    item.group.style.display = '';
                                    item.group.classList.add('open');
                                } else if (item.subId) {
                                    // It's a parent submenu button — show it and its sub
                                    const wrapper = item.el.closest('div');
                                    if (wrapper) wrapper.style.display = '';
                                    const sub = document.getElementById(item.subId);
                                    if (sub) { sub.style.display = ''; sub.classList.add('open'); }
                                }
                            }
                        });

                        searchEmptyMsg.classList.toggle('hidden', anyMatch);
                    }, 140);
                });

                searchClear.addEventListener('click', () => {
                    searchInput.value = '';
                    searchClear.classList.add('hidden');
                    searchEmptyMsg.classList.add('hidden');
                    resetSearch();
                });

                // Escape key clears
                document.addEventListener('keydown', e => {
                    if (e.key === 'Escape' && searchInput.value) {
                        searchInput.value = '';
                        searchClear.classList.add('hidden');
                        searchEmptyMsg.classList.add('hidden');
                        resetSearch();
                    }
                });

                function resetSearch() {
                    // Restore all items visibility
                    document.querySelectorAll('#sideNav > *').forEach(el => el.style.display = '');
                    document.querySelectorAll('#sideNav a, #sideNav button').forEach(el => el.style.display = '');
                    // Collapse all submenus back
                    document.querySelectorAll('.submenu').forEach(s => { s.classList.remove('open'); s.style.display = ''; });
                    document.querySelectorAll('.has-sub').forEach(b => b.classList.remove('open'));
                    searchEmptyMsg.classList.add('hidden');
                }
            })();
    </script>
</body>

</html>

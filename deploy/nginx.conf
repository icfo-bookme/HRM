server {
    listen 8001;
    server_name 187.77.128.105;

    root /var/www/hrm/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/hrm_access.log;
    error_log /var/log/nginx/hrm_error.log;

    # Security: hide PHP version
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static assets cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to sensitive files
    location ~ (\.env|\.git|composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock|artisan)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Laravel entry point
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM passthrough
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny direct access to /storage (except for files)
    location ~ ^/storage/ {
        try_files $uri $uri/ =404;
    }
}